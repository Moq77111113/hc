name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing (OIDC)

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: hc
            hc_tags: ""
          - image: hc-core
            hc_tags: "hc_slim hc_http hc_https hc_tcp"
          - image: hc-sql
            hc_tags: "hc_slim hc_tcp hc_postgres"
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit # tighten to 'block' once the audit shows the allowlist

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            HC_TAGS=${{ matrix.hc_tags }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max # SLSA provenance attestation
          sbom: true # SBOM attestation

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image (keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
