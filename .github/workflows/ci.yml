name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go test ./...

  slim:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tags:
          # probes:begin
          - "hc_slim hc_http"
          - "hc_slim hc_https"
          - "hc_slim hc_tcp"
          - "hc_slim hc_postgres"
          - "hc_slim hc_mysql"
          - "hc_slim hc_redis"
          - "hc_slim hc_http hc_https hc_tcp"
          - "hc_slim hc_tcp hc_postgres hc_mysql"
          # probes:end
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build -tags "${{ matrix.tags }}" -o /dev/null .
      - run: go test -tags "${{ matrix.tags }}" ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -v ./... # -v so the log shows RUN/PASS, not a silent SKIP
        working-directory: test
