name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go test ./...

  slim:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tags:
          # probes:begin
          - "hc_slim hc_http"
          - "hc_slim hc_https"
          - "hc_slim hc_tcp"
          - "hc_slim hc_postgres"
          - "hc_slim hc_mysql"
          - "hc_slim hc_redis"
          - "hc_slim hc_amqp"
          - "hc_slim hc_grpc"
          - "hc_slim hc_http hc_https hc_tcp"
          - "hc_slim hc_tcp hc_postgres hc_mysql"
          # probes:end
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go build -tags "${{ matrix.tags }}" -o /dev/null .
      - run: go test -tags "${{ matrix.tags }}" ./...

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go generate ./...
      # Fails on any drift, including new untracked files git diff alone misses.
      - run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::go generate produced uncommitted changes — run 'go generate ./...' and commit:"
            git status --porcelain
            git diff
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: latest

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
      - run: go test -v ./...
        working-directory: test
